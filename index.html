<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Forge | Pro Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#020617] text-slate-100 font-sans selection:bg-indigo-500/30">

    <main class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row min-h-screen">

        <section
            class="preview-section lg:w-5/12 flex flex-col items-center justify-center sticky top-0 z-[100] bg-[#020617]/95 lg:bg-transparent backdrop-blur-xl lg:backdrop-blur-none border-b lg:border-b-0 lg:border-r border-slate-800/50 p-6 lg:h-screen">

            <div
                class="hidden lg:flex absolute top-10 left-10 items-center gap-2 opacity-40 tracking-[0.3em] text-[9px] font-black uppercase italic">
                <span class="flex h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></span>
                System_Live
            </div>

            <div id="avatar-container" class="relative group">
                <div
                    class="absolute -inset-10 bg-indigo-500/10 rounded-full blur-[60px] opacity-50 transition-all group-hover:bg-indigo-500/20">
                </div>
                <div id="avatar-frame" class="avatar-frame relative z-10">
                    <img id="avatar-img" src="" alt="Avatar Render" class="avatar-render">
                </div>
            </div>

            <button onclick="window.randomize()"
                class="mt-6 lg:mt-12 group bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-2xl font-black italic tracking-widest transition-all hover:scale-105 active:scale-95 text-[10px] lg:text-xs shadow-2xl shadow-indigo-500/20">
                <i class="fas fa-dice-d20 mr-2 group-hover:rotate-180 transition-transform duration-500"></i>
                GERAR ALEATÓRIO
            </button>
        </section>

        <section class="lg:w-7/12 flex flex-col p-6 lg:p-12 bg-slate-900/20">

            <header class="mb-12">
                <p class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.5em] mb-2 opacity-70">Neural
                    Engine v3.6.0</p>
                <h1 class="text-4xl lg:text-5xl font-black italic tracking-tighter uppercase">
                    Avatar<span class="text-indigo-500">_</span>Forge
                </h1>
                <div class="h-1 w-20 bg-indigo-500 mt-4 rounded-full"></div>
            </header>

            <div class="bg-slate-800/30 p-6 rounded-[2rem] border border-white/5 mb-8 animate-in">
                <div class="flex items-center justify-between mb-5">
                    <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Ambiente de Fundo</h3>
                    <div id="gradient-type-container" class="hidden animate-in">
                        <select onchange="window.setGradientType(this.value)"
                            class="bg-slate-950 text-[10px] px-3 py-1 rounded-lg border border-slate-700 outline-none text-indigo-300 font-bold">
                            <option value="linear">Linear</option>
                            <option value="radial">Radial</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.setBackgroundMode('solid')" id="btn-solid"
                        class="flex-1 py-3 rounded-xl text-[10px] font-black border border-slate-700 transition-all btn-active">SÓLIDO</button>
                    <button onclick="window.setBackgroundMode('gradient')" id="btn-gradient"
                        class="flex-1 py-3 rounded-xl text-[10px] font-black border border-slate-700 transition-all">GRADIENTE</button>
                </div>
            </div>

            <div id="controls-container" class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-16"></div>

            <footer
                class="mt-auto pt-10 border-t border-slate-800/60 flex flex-col gap-8 pb-12 opacity-40 hover:opacity-80 transition-opacity">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
                    <div class="text-[10px] font-bold tracking-widest space-y-1">
                        <p>CORE_BUILD: 3.6.0_STABLE</p>
                        <a href="https://github.com/maiconfriedel/random-avatar-generator" target="_blank"><span class="text-slate-400 hover:text-slate-300 transition-colors duration-200 cursor-pointer underline underline-offset-2">LICENSE: MIT (COPYRIGHT 2019 MAICON FRIEDEL)</span></a>
                    </div>
                </div>
                <p class="text-[9px] leading-relaxed text-slate-400 font-medium">
                    O uso e modificação são permitidos mantendo os avisos de licença originais.
                </p>
            </footer>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
